<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostMaster - Blogging API</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --post-bg: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .app-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            letter-spacing: 1px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--bg-dark);
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            color: white;
        }

        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-secondary { background-color: var(--border); }
        .btn-secondary:hover { background-color: #64748b; }

        .btn-danger { background-color: var(--danger); padding: 6px 12px; font-size: 12px; }
        .btn-danger:hover { background-color: var(--danger-hover); }

        .btn-edit { background-color: var(--primary); padding: 6px 12px; font-size: 12px; }
        .btn-edit:hover { background-color: var(--primary-hover); }

        #message-box {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9em;
            display: none;
            word-wrap: break-word;
            text-align: center;
        }

        .success { background-color: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .error { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .feed-header h3 {
            margin: 0;
            font-size: 1.2rem;
        }

        .feed-header button {
            flex: none;
            padding: 6px 12px;
            background-color: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        
        .feed-header button:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        #posts-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .post-card {
            background-color: var(--post-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .post-title {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .post-content {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .post-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-style: italic;
        }

        @media (max-width: 480px) {
            body { padding: 15px 10px; }
            .app-card { padding: 20px; }
            .btn-group { flex-direction: column; }
            button { padding: 14px; }
            .feed-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .feed-header button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <h2>📝 Blogging Platform API</h2>

    <div id="message-box"></div>

    <div class="form-group">
        <label for="title">Post Title</label>
        <input type="text" id="title" placeholder="Enter an engaging title...">
    </div>
    
    <div class="form-group">
        <label for="content">Content</label>
        <textarea id="content" rows="3" placeholder="Write your blog post here..."></textarea>
    </div>

    <input type="hidden" id="edit-id" value="">

    <div class="btn-group">
        <button class="btn-primary" id="submit-btn" onclick="submitPost()">Publish Post</button>
        <button class="btn-secondary" id="cancel-btn" style="display: none;" onclick="cancelEdit()">Cancel</button>
    </div>

    <div class="feed-header">
        <h3>Recent Posts</h3>
        <button onclick="fetchPosts()">🔄 Refresh</button>
    </div>

    <div id="posts-container">
        <div class="empty-state">Loading posts...</div>
    </div>
</div>

<script>
    function getBackendDomain() {
        const domain = window.location.hostname;
        
        if (domain === "localhost" || domain === "127.0.0.1") {
            return "http://localhost:8080";
        }

        const protocolPrefix = "https://";
        const firstDotIndex = domain.indexOf('.');
        
        if (firstDotIndex === -1) {
            return protocolPrefix + domain + "-backend";
        }

        const subdomain = domain.substring(0, firstDotIndex);
        const restOfDomain = domain.substring(firstDotIndex);
        return protocolPrefix + subdomain + "-backend" + restOfDomain;
    }

    function showMessage(msg, isError = false) {
        const box = document.getElementById('message-box');
        box.style.display = 'block';
        box.textContent = msg;
        box.className = isError ? 'error' : 'success';
        setTimeout(() => box.style.display = 'none', 4000);
    }

    // --- API Interactions ---

    // GET /posts
    async function fetchPosts() {
        const container = document.getElementById('posts-container');
        try {
            const res = await fetch(getBackendDomain() + "/posts");
            if (!res.ok) throw new Error("Failed to fetch posts");
            
            const posts = await res.json();
            
            if (!posts || posts.length === 0) {
                container.innerHTML = '<div class="empty-state">No posts found. Write something awesome!</div>';
                return;
            }

            // Render posts
            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <h4 class="post-title">${escapeHTML(post.title)}</h4>
                    <div class="post-meta">ID: ${post.id} | Posted: ${post.created_at}</div>
                    <div class="post-content">${escapeHTML(post.content)}</div>
                    <div class="post-actions">
                        <button class="btn-edit" onclick="setupEdit(${post.id}, '${escapeQuote(post.title)}', '${escapeQuote(post.content)}')">Edit</button>
                        <button class="btn-danger" onclick="deletePost(${post.id})">Delete</button>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            container.innerHTML = `<div class="empty-state" style="color: var(--danger);">Network Error. Is the backend running?</div>`;
        }
    }

    // POST /posts OR PUT /posts/{id}
    async function submitPost() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        const editId = document.getElementById('edit-id').value;

        if (!title || !content) {
            showMessage("Both Title and Content are required.", true);
            return;
        }

        const isUpdate = editId !== "";
        const url = isUpdate ? `${getBackendDomain()}/posts/${editId}` : `${getBackendDomain()}/posts`;
        const method = isUpdate ? "PUT" : "POST";

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });

            if (res.ok) {
                showMessage(isUpdate ? "Post updated successfully!" : "Post published successfully!");
                cancelEdit(); // Clears form
                fetchPosts(); // Refreshes feed
            } else {
                const text = await res.text();
                showMessage(`Error: ${text}`, true);
            }
        } catch (error) {
            showMessage("Network Error.", true);
        }
    }

    // DELETE /posts/{id}
    async function deletePost(id) {
        if (!confirm("Are you sure you want to delete this post?")) return;

        try {
            const res = await fetch(`${getBackendDomain()}/posts/${id}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                showMessage("Post deleted.");
                fetchPosts();
            } else {
                showMessage("Failed to delete post.", true);
            }
        } catch (error) {
            showMessage("Network Error.", true);
        }
    }

    // --- UI Helpers ---

    function setupEdit(id, title, content) {
        document.getElementById('title').value = title;
        document.getElementById('content').value = content;
        document.getElementById('edit-id').value = id;
        
        document.getElementById('submit-btn').textContent = "Update Post";
        document.getElementById('cancel-btn').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        document.getElementById('title').value = "";
        document.getElementById('content').value = "";
        document.getElementById('edit-id').value = "";
        
        document.getElementById('submit-btn').textContent = "Publish Post";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[tag]));
    }

    function escapeQuote(str) {
        return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
    }

    // Initial Load
    fetchPosts();
</script>

</body>
</html>
